<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>Study Timer</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="color-menu">
            <select id="colorSelect">
                <option value="">🎨 Theme</option>
                <option value="#cfdede">🌿 Mint</option>
                <option value="#b8d8c8">🌱 Sage</option>
                <option value="#f5efd9">🍦 Cream</option>
                <option value="#efe2c6">🏖 Sand</option>
                <option value="#f6d4b8">🍑 Peach</option>
                <option value="#2f3e46">🌙 Night</option>
            </select>
        </div>

        <div class="mode_tabs">
            <button id="focus_button" onclick="setFocus()">Focus</button>
            <button id="short_button" onclick="setShortBreak()">Short Break</button>
            <button id="long_button" onclick="setLongBreak()">Long Break</button>
        </div>

        <img src="timer.png" id="timer_picture" width="300px">

        <div class="container">
            
            <img src="logo.png" id="logo" width="300px">
            <div id="timer">25:00</div>

            <button id="start" onclick="start()">Start</button>
            <button id="pause" onclick="pause()">Pause</button>
            <button id="restart" onclick="restart()">Restart</button>
        </div>

        <script src="Timer.js"></script>

    </body>

</html>

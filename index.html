<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>Study Timer</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body style="display:none">
        <script type="module">
            import { supabase } from './supabase.js'
            const { data: { session } } = await supabase.auth.getSession()
            if (!session) {
                window.location.replace('login.html')
            } else {
                document.body.style.display = ''
                document.getElementById('user-email').textContent = session.user.email

                document.getElementById('signout-btn').addEventListener('click', async () => {
                    await supabase.auth.signOut()
                    window.location.replace('login.html')
                })

                // Wire up timer buttons (Timer.js functions may not be global in Vite module context)
                document.getElementById('focus_button').addEventListener('click', () => setFocus())
                document.getElementById('short_button').addEventListener('click', () => setShortBreak())
                document.getElementById('long_button').addEventListener('click', () => setLongBreak())
                document.getElementById('start').addEventListener('click', () => start())
                document.getElementById('pause').addEventListener('click', () => pause())
                document.getElementById('restart').addEventListener('click', () => restart())

                // Sync JS state with the 25:00 shown in the HTML on load
                setFocus()
            }
        </script>

        <div class="user-bar">
            <span id="user-email"></span>
            <button id="signout-btn">Sign Out</button>
        </div>

        <div class="color-menu">
            <select id="colorSelect">
                <option value="">🎨 Theme</option>
                <option value="#cfdede">🌿 Mint</option>
                <option value="#b8d8c8">🌱 Sage</option>
                <option value="#f5efd9">🍦 Cream</option>
                <option value="#efe2c6">🏖 Sand</option>
                <option value="#f6d4b8">🍑 Peach</option>
                <option value="#2f3e46">🌙 Night</option>
            </select>
        </div>

        <div class="mode_tabs">
            <button id="focus_button">Focus</button>
            <button id="short_button">Short Break</button>
            <button id="long_button">Long Break</button>
        </div>

        <img src="timer.png" id="timer_picture" width="300px">

        <div class="container">
            
            <img src="logo.png" id="logo" width="300px">
            <div id="timer">25:00</div>

            <button id="start">Start</button>
            <button id="pause">Pause</button>
            <button id="restart">Restart</button>
        </div>

        <script src="Timer.js"></script>

    </body>

</html>

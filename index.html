<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>Study Timer</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body style="display:none">
        <script type="module">
            import { supabase } from './supabase.js'
            import { startSession, addFocusMinute, endSession, endSessionSync } from './session.js'

            const { data: { session } } = await supabase.auth.getSession()
            if (!session) {
                window.location.replace('login.html')
            } else {
                document.body.style.display = ''
                document.getElementById('user-email').textContent = session.user.email

                // Start tracking this login as a session
                await startSession(session.user.id, session.access_token)

                // Timer.js calls this each time a focus minute completes
                window.onFocusMinuteCompleted = addFocusMinute

                // End session on tab close
                window.addEventListener('beforeunload', () => endSessionSync())

                document.getElementById('signout-btn').addEventListener('click', async () => {
                    await endSession()
                    await supabase.auth.signOut()
                    window.location.replace('login.html')
                })

                document.getElementById('focus_button').addEventListener('click', () => setFocus())
                document.getElementById('short_button').addEventListener('click', () => setShortBreak())
                document.getElementById('long_button').addEventListener('click', () => setLongBreak())
                document.getElementById('start').addEventListener('click', () => start())
                document.getElementById('pause').addEventListener('click', () => pause())
                document.getElementById('restart').addEventListener('click', () => restart())

                setFocus()
            }
        </script>

        <div class="user-bar">
            <span id="user-email"></span>
            <button id="signout-btn">Sign Out</button>
        </div>

        <div class="settings-dropdown">
            <button id="settingsButton">⚙ Settings</button>
        
            <div id="settingsMenu" class="dropdown-menu hidden">
                <h3>Timer Settings</h3>
        
                <label for="pomodoroInput">Focus</label>
                <input type="number" id="pomodoroInput" value="25">
        
                <label for="shortBreakInput">Short Break</label>
                <input type="number" id="shortBreakInput" value="5">
        
                <label for="longBreakInput">Long Break</label>
                <input type="number" id="longBreakInput" value="15">
        
                <h3>Theme</h3>
        
                <label for="backgroundColorInput">Background Color</label>
                <input type="color" id="backgroundColorInput" value="#ECF9F8">
        
                <label for="textColorInput">Text Color</label>
                <input type="color" id="textColorInput" value="#1F8A8A">
        
                <button id="saveSettings">Save</button>
            </div>
        </div>

        <div class="mode_tabs">
            <button id="focus_button">Focus</button>
            <button id="short_button">Short Break</button>
            <button id="long_button">Long Break</button>
        </div>

        <img src="timer.png" id="timer_picture" width="300px">

        <div class="container">
            
            <img src="logo.png" id="logo" width="300px">
            <div id="timer">25:00</div>

            <button id="start">Start</button>
            <button id="pause">Pause</button>
            <button id="restart">Restart</button>
        </div>

        <script src="Timer.js"></script>

    </body>

</html>

<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>Top Sessions</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="leaderboard.css">
    </head>

    <body style="display:none">
        <script type="module">
            import { supabase } from './supabase.js'

            const { data: { session } } = await supabase.auth.getSession()
            if (!session) {
                window.location.replace('login.html')
            } else {
                document.body.style.display = ''

                const savedBg = localStorage.getItem('bgColor')
                const savedTextColor = localStorage.getItem('textColor')
                if (savedBg) document.body.style.backgroundColor = savedBg
                if (savedTextColor) {
                    document.querySelector('.lb-back').style.color = savedTextColor
                }

                const list = document.getElementById('leaderboard-list')
                const subtitle = document.getElementById('lb-subtitle')
                const heading = document.getElementById('lb-heading')

                async function loadPersonal() {
                    heading.textContent = '🏆 My Top Sessions'
                    subtitle.textContent = 'Your 10 best focus sessions, ranked by total minutes.'
                    list.innerHTML = '<p class="lb-empty">Loading...</p>'

                    const { data, error } = await supabase
                        .from('user_sessions')
                        .select('session_start, session_length')
                        .eq('user_id', session.user.id)
                        .gt('session_length', 0)
                        .order('session_length', { ascending: false })
                        .limit(10)

                    if (error || !data || data.length === 0) {
                        list.innerHTML = '<p class="lb-empty">No sessions yet. Complete a focus session to see your stats!</p>'
                        return
                    }

                    const medals = ['🥇', '🥈', '🥉']
                    list.innerHTML = data.map((s, i) => {
                        const date = new Date(s.session_start).toLocaleDateString('en-US', {
                            weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
                        })
                        const rank = medals[i] ?? `#${i + 1}`
                        const hrs = Math.floor(s.session_length / 60)
                        const mins = s.session_length % 60
                        const duration = hrs > 0 ? `${hrs}h ${mins}m` : `${mins} min`
                        return `
                            <div class="lb-row">
                                <span class="lb-rank">${rank}</span>
                                <span class="lb-date">${date}</span>
                                <span class="lb-mins">${duration}</span>
                            </div>
                        `
                    }).join('')
                }

                async function loadFriends() {
                    heading.textContent = '👥 Friends Leaderboard'
                    subtitle.textContent = "Top 10 sessions among you and your friends."
                    list.innerHTML = '<p class="lb-empty">Loading...</p>'

                    // Get my friends list
                    const { data: me } = await supabase
                        .from('Users')
                        .select('username, friends')
                        .eq('user_id', session.user.id)
                        .single()

                    const usernames = [me.username, ...(me.friends || [])]

                    // Resolve usernames to user_ids
                    const { data: users } = await supabase
                        .from('Users')
                        .select('user_id, username')
                        .in('username', usernames)

                    if (!users || users.length === 0) {
                        list.innerHTML = '<p class="lb-empty">No friends yet. Add some on the Friends page!</p>'
                        return
                    }

                    const idToName = Object.fromEntries(users.map(u => [u.user_id, u.username]))
                    const userIds = users.map(u => u.user_id)

                    const { data: sessions, error } = await supabase
                        .from('user_sessions')
                        .select('user_id, session_start, session_length')
                        .in('user_id', userIds)
                        .gt('session_length', 0)
                        .order('session_length', { ascending: false })
                        .limit(10)

                    if (error || !sessions || sessions.length === 0) {
                        list.innerHTML = '<p class="lb-empty">No sessions yet from you or your friends.</p>'
                        return
                    }

                    const medals = ['🥇', '🥈', '🥉']
                    list.innerHTML = sessions.map((s, i) => {
                        const date = new Date(s.session_start).toLocaleDateString('en-US', {
                            weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
                        })
                        const rank = medals[i] ?? `#${i + 1}`
                        const hrs = Math.floor(s.session_length / 60)
                        const mins = s.session_length % 60
                        const duration = hrs > 0 ? `${hrs}h ${mins}m` : `${mins} min`
                        const name = idToName[s.user_id] || 'Unknown'
                        return `
                            <div class="lb-row">
                                <span class="lb-rank">${rank}</span>
                                <span class="lb-name">${name}</span>
                                <span class="lb-date">${date}</span>
                                <span class="lb-mins">${duration}</span>
                            </div>
                        `
                    }).join('')
                }

                document.querySelectorAll('.lb-tab').forEach(tab => {
                    tab.addEventListener('click', () => {
                        document.querySelectorAll('.lb-tab').forEach(t => t.classList.remove('active'))
                        tab.classList.add('active')
                        if (tab.dataset.tab === 'personal') loadPersonal()
                        else loadFriends()
                    })
                })

                loadPersonal()
            }
        </script>

        <div class="lb-page">
            <a href="index.html" class="lb-back">← Back to Timer</a>

            <div class="lb-card">
                <div class="lb-tabs">
                    <button class="lb-tab active" data-tab="personal">Personal</button>
                    <button class="lb-tab" data-tab="friends">Friends</button>
                </div>
                <h1 id="lb-heading">🏆 My Top Sessions</h1>
                <p class="lb-subtitle" id="lb-subtitle">Your 10 best focus sessions, ranked by total minutes.</p>
                <div id="leaderboard-list">
                    <p class="lb-empty">Loading...</p>
                </div>
            </div>
        </div>

    </body>

</html>

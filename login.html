<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>Study Timer – Login</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="login.css">
    </head>

    <body>

        <div class="auth-wrapper">
            <img src="logo.png" id="auth-logo" width="260px">

            <!-- Login Form -->
            <div id="login-section" class="auth-card">
                <h2>Welcome back</h2>
                <form id="login-form">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="Enter your email" required>

                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required>

                    <p id="login-error" class="auth-error"></p>

                    <button type="submit" class="auth-btn">Log In</button>
                </form>
                <p class="auth-switch">
                    Don't have an account?
                    <a href="#" id="show-create">Create one</a>
                </p>
            </div>

            <!-- Create Account Form -->
            <div id="create-section" class="auth-card" style="display:none;">
                <h2>Create account</h2>
                <form id="create-form">
					<label for="create-username">Username</label>
					<input type="text" id="create-username" placeholder="Choose a username" required>
                    <label for="create-email">Email</label>
                    <input type="email" id="create-email" placeholder="Enter your email" required>

                    <label for="create-password">Password</label>
                    <input type="password" id="create-password" placeholder="Choose a password" required>

                    <label for="create-confirm">Confirm Password</label>
                    <input type="password" id="create-confirm" placeholder="Re-enter your password" required>

                    <p id="create-error" class="auth-error"></p>

                    <button type="submit" class="auth-btn">Create Account</button>
                </form>
                <p class="auth-switch">
                    Already have an account?
                    <a href="#" id="show-login">Log in</a>
                </p>
            </div>
        </div>

        <script type="module" src="login.js"></script>

    </body>

</html>
